{% extends 'base.html' %}
{% block title %}Student Login{% endblock %}
{% block navbar %}{% endblock %}
{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <span class="login-icon">🎓</span>
    <h2>Student Portal</h2>
    <p class="subtitle">Sign in with your hall ticket number</p>

    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}

    <form method="POST">
      <div class="form-group">
        <label>Hall Ticket Number</label>
        <input name="hallticket" class="form-control text-mono" placeholder="22BD1A0501" required autofocus/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input name="password" type="password" class="form-control" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Sign In →</button>
    </form>
    <p class="text-center text-sm text-muted mt-16">
      Default password = Hall Ticket Number &nbsp;·&nbsp; <a href="/">← Home</a>
    </p>
  </div>
</div>
{% endblock %}
