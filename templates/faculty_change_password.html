{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}
{% block nav_links %}
  <a href="{{ url_for('faculty_dashboard') }}">Dashboard</a>
  <a href="{{ url_for('faculty_change_password') }}" class="active">Password</a>
  <a href="{{ url_for('logout') }}" class="logout">Logout</a>
{% endblock %}
{% block content %}
<div class="container page-wrap">
  <div style="max-width:440px;margin:0 auto">
    <div class="page-header"><h1>Change Password</h1></div>
    {% if msg %}<div class="alert alert-{{ msg[0] }}">{{ msg[1] }}</div>{% endif %}
    <div class="card">
      <div class="card-body">
        <form method="POST">
          <div class="form-group"><label>Current Password</label><input name="old_password" type="password" class="form-control" required/></div>
          <div class="form-group"><label>New Password</label><input name="new_password" type="password" class="form-control" required minlength="4"/></div>
          <button class="btn btn-primary btn-block">Update Password</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
